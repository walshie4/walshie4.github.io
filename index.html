<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adam Walsh - Matrix Theme</title>
    <style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Courier New', Courier, monospace;
        background-color: #000;
        color: #00ff00;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }
    
    .container {
        text-align: center;
        padding: 20px;
        max-width: 800px;
        background: rgba(0, 255, 0, 0.05);
        border: 1px solid #00ff00;
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        backdrop-filter: blur(5px);
        position: relative;
        z-index: 1;
    }
    
    header {
        margin-bottom: 30px;
    }
    
    h1 {
        font-size: 3em;
        text-shadow: 0 0 10px #00ff00;
    }
    
    .tagline {
        font-size: 1.2em;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    
    main section {
        margin-bottom: 40px;
        padding: 20px;
        background: rgba(0, 255, 0, 0.1);
        border: 1px solid #00cc00;
        box-shadow: inset 0 0 15px rgba(0, 255, 0, 0.2);
    }
    
    h2 {
        font-size: 2em;
        margin-bottom: 15px;
        text-shadow: 0 0 8px #00ff00;
    }
    
    p {
        font-size: 1.1em;
        line-height: 1.6;
    }
    
    .matrix-link {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: #00ff00;
        color: #000;
        text-decoration: none;
        font-weight: bold;
        box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        transition: background-color 0.3s ease, transform 0.3s ease;
    }
    
    .matrix-link:hover {
        background: #ffffff;
        color: #000;
        transform: translateY(-2px);
    }
    
    footer {
        margin-top: 30px;
        font-size: 0.9em;
        opacity: 0.7;
    }
    
    /* Matrix rain effect */
    .matrix-rain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
        overflow: hidden;
    }
    
    .matrix-rain span {
        position: absolute;
        font-family: 'Courier New', Courier, monospace;
        color: #00ff00;
        opacity: 0;
        animation: matrix-rain-animation 5s linear infinite;
    }
    
    @keyframes matrix-rain-animation {
        0% { opacity: 0; transform: translateY(-20px); }
        20% { opacity: 1; }
        80% { opacity: 1; }
        100% { opacity: 0; transform: translateY(100vh); }
    }
    </style>
</head>
<body>
    <!-- Matrix rain container -->
    <div class="matrix-rain"></div>
    <div class="container">
        <header>
            <h1>Adam Walsh</h1>
            <p class="tagline">Developer | Hacker | Visionary</p>
        </header>
        <main>
            <section id="github">
                <h2>My GitHub</h2>
                <p>Explore my projects and contributions.</p>
                <a href="https://github.com/adamwalsh" target="_blank" class="matrix-link">Visit GitHub Profile</a>
            </section>
            <section id="blog">
                <h2>Blog</h2>
                <p>Coming soon. Space reserved for future insights and thoughts.</p>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Adam Walsh. All rights reserved.</p>
        </footer>
    </div>
    <script>
    // Simple matrix rain effect
    const matrixRainContainer = document.querySelector('.matrix-rain');
    function createRaindrop() {
        const raindrop = document.createElement('span');
        raindrop.textContent = String.fromCharCode(Math.floor(Math.random() * 94) + 33);
        raindrop.style.left = Math.random() * 100 + 'vw';
        raindrop.style.animationDuration = (Math.random() * 5 + 5) + 's';
        raindrop.style.animationDelay = (Math.random() * -5) + 's';
        matrixRainContainer.appendChild(raindrop);
        raindrop.addEventListener('animationend', () => {
            raindrop.remove();
        });
    }
    // Initial drops
    for (let i = 0; i < 100; i++) {
        createRaindrop();
    }
    // Continuous drops
    setInterval(createRaindrop, 50);
    </script>
</body>
</html>
